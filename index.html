<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>Flying Runners - Community Fitness Tracker</title>
    <meta name="description" content="Track your workouts, join challenges and compete on the community leaderboard with Flying Runners." />
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FitTrack" />

    <link rel="icon" type="image/svg+xml" href="/Fitness-application/icons/icon-192.svg" />
    <link rel="apple-touch-icon" href="/Fitness-application/icons/icon-192.png" />
    <link rel="manifest" href="/Fitness-application/manifest.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/Fitness-application/sw.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.log('SW failed:', err));
        });
      }
    </script>
  </body>
</html>
